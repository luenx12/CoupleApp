name: Backend Deploy to VPS

on:
  push:
    branches:
      - master

    paths:
      - "CoupleApp.Core/**"
      - "CoupleApp.Infrastructure/**"
      - "CoupleApp.Application/**"
      - "CoupleApp.Backend/**"
      - "Dockerfile"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
  ##yorum

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:${{ github.sha }}

  deploy-vps:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Launch
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/coupleapp
            # Export environment variables mapping secrets
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export FCM_KEY="${{ secrets.FCM_KEY }}"
            export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

            # Simple deploy: Pull new image -> Stop cluster -> Rebuild -> Start
            docker-compose -f docker-compose.prod.yml pull backend
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d

            # Prune old anonymous images to save space
            docker image prune -af
