name: Backend Deploy to VPS

on:
  push:
    branches:
      - master
    paths:
      - "CoupleApp.Core/**"
      - "CoupleApp.Infrastructure/**"
      - "CoupleApp.Application/**"
      - "CoupleApp.Backend/**"
      - "Dockerfile"
      - ".github/workflows/deploy-backend.yml"
      - "docker-compose.prod.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:${{ github.sha }}

  deploy-vps:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 1. Sunucuyu Hazirla
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /opt/coupleapp

      - name: 2. Dosyalari Kopyala
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "/opt/coupleapp/"

      - name: 3. Sistemi Ayaga Kaldir
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          FCM_KEY: ${{ secrets.FCM_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DB_PASSWORD,JWT_SECRET,SENTRY_DSN,FCM_KEY
          script: |
            cd /opt/coupleapp
            printf 'DOCKERHUB_USERNAME=%s\n' "$DOCKERHUB_USERNAME" > .env
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" >> .env
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN" >> .env
            printf 'Firebase__ServerKey=%s\n' "$FCM_KEY" >> .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af
