name: Backend Deploy to VPS

on:
  push:
    branches:
      - master
    paths:
      - "CoupleApp.Core/**"
      - "CoupleApp.Infrastructure/**"
      - "CoupleApp.Application/**"
      - "CoupleApp.Backend/**"
      - "Dockerfile"
      - ".github/workflows/deploy-backend.yml"
      - "docker-compose.prod.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:${{ github.sha }}

  deploy-vps:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 1. .env Dosyasini Olustur (Runner Uzerinde)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          FCM_KEY: ${{ secrets.FCM_KEY }}
        run: |
          echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" > .env
          echo "DB_PASSWORD=$DB_PASSWORD" >> .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "SENTRY_DSN=$SENTRY_DSN" >> .env
          # jq ile JSON formatini bozmadan (tirnaklari silmeden) tek satira indirger
          FCM_FLAT=$(echo "$FCM_KEY" | jq -c .)
          echo "Firebase__ServerKey=$FCM_FLAT" >> .env

      - name: 2. Dosyalari Sunucuya Kopyala
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx.conf,.env"
          target: "/opt/coupleapp/"

      - name: 3. Sistemi Ayaga Kaldir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/coupleapp
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af
