version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: coupleapp_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: CoupleAppProdDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/coupleapp-backend:latest
    container_name: coupleapp_prod_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FCM_KEY: ${FCM_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "5000:8080" # Exposed internally to NGINX via 5000, 8080 is internal Docker SDK 8.0 default

  nginx:
    image: nginx:alpine
    container_name: coupleapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  pgdata_prod:
