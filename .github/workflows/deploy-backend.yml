name: Backend Deploy to VPS

on:
  push:
    branches:
      - master
    paths:
      - "CoupleApp.Core/**"
      - "CoupleApp.Infrastructure/**"
      - "CoupleApp.Application/**"
      - "CoupleApp.Backend/**"
      - "Dockerfile"
      - ".github/workflows/deploy-backend.yml"
      - "docker-compose.prod.yml" # BU EKLENDİ: Compose dosyası değişince de Action çalışsın
  workflow_dispatch: # HİZALAMA DÜZELTİLDİ: Artık buton sorunsuz çıkacak

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/coupleapp-backend:${{ github.sha }}

  deploy-vps:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # ÇOK ÖNEMLİ: Kuryenin dosyayı bulabilmesi için bu şart

      - name: 1. Sunucuyu Hazırla (Klasör Yarat)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/coupleapp

      - name: 2. Kurye ile Dosyayı Bırak
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/coupleapp/"

      - name: 3. Sistemi Ayağa Kaldır
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/coupleapp
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export FCM_KEY='${{ secrets.FCM_KEY }}'
            export SENTRY_DSN='${{ secrets.SENTRY_DSN }}'
            export DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            export DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}'

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -af
