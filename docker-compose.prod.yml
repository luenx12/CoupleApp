version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: coupleapp_prod_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: CoupleAppProdDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/coupleapp-backend:latest
    container_name: coupleapp_prod_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # --- KRİTİK AYARLAR BAŞLIYOR ---
      # appsettings.json içindeki localhost'u burada 'postgres' ile eziyoruz:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=CoupleAppProdDb;Username=postgres;Password=${DB_PASSWORD}
      
      # appsettings içindeki Jwt:Secret kısmını günceller:
      - Jwt__Secret=${JWT_SECRET}
      
      # appsettings içindeki Sentry:Dsn kısmını günceller:
      - Sentry__Dsn=${SENTRY_DSN}
      
      # FCM Key (Eğer kodda 'Firebase:ServerKey' gibi bir yer varsa ona göre isimlendirilebilir):
      - FCM_KEY=${FCM_KEY}
      # --- KRİTİK AYARLAR BİTTİ ---
    ports:
      - "5000:8080"

  nginx:
    image: nginx:alpine
    container_name: coupleapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  pgdata_prod: