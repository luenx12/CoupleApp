name: couple_app_mobile
description: "Zero-Leak E2EE Couple App — Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # SignalR
  signalr_netcore: ^1.3.6

  # Biometric auth
  local_auth: ^2.3.0

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.2

  # HTTP
  dio: ^5.7.0

  # UI enhancements
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8

  # Zero-Leak Cryptography (RSA-2048 + AES-256-GCM Hybrid)
  pointycastle: ^3.9.1

  # Encrypted media storage (app-private directory, no backup)
  path_provider: ^2.1.5

  # ── Aşama 4: Chat ─────────────────────────────────────────────────────
  # Local message database (plaintext text only, zero-leak principle for media)
  sqflite: ^2.3.3+1

  # Media picker (gallery / camera)
  image_picker: ^1.1.2

  # HTTP multipart upload for encrypted media
  http: ^1.2.2

  # Unique IDs for media files
  uuid: ^4.5.1

  # ── Aşama 5: Location ─────────────────────────────────────────────────
  # GPS
  geolocator: ^13.0.2

  # Dark-theme map with custom pins
  google_maps_flutter: ^2.9.0
  lottie: ^3.3.1
  scratcher: ^2.5.0
  confetti: ^0.8.0
  video_player: ^2.10.1

  # ── Aşama 6: FCM Push Notifications ───────────────────────────────────
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.1.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
